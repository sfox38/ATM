name: HACS

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    # Daily, so an upstream HACS rule change is caught even with no commits.
    - cron: "23 5 * * *"
  workflow_dispatch:

jobs:
  validate:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          # "brands" requires the domain to be registered in home-assistant/brands,
          # which only applies to HACS-default inclusion. ATM ships as a custom
          # repository, so skip it; the rest (structure, hacs.json, manifest) runs.
          ignore: brands
