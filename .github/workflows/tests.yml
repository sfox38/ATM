name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Matches the pinned test stack in requirements_test.txt
          # (pytest-homeassistant-custom-component -> homeassistant 2026.6.x).
          python-version: "3.14"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Run vitest
        run: npm run test
