name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          # Matches the pinned test stack in requirements_test.txt
          # (pytest-homeassistant-custom-component -> homeassistant 2026.6.x).
          python-version: "3.14"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Sourced from .nvmrc so CI, local dev, and the lockfile stay on one
          # Node major. It must match the npm that generated package-lock.json
          # (npm 11 / Node 24); an older npm resolves the tree differently and
          # makes `npm ci` reject the lockfile as out of sync.
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Run vitest
        run: npm run test
